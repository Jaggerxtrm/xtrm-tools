specialist:
  metadata:
    name: researcher
    version: 1.0.0
    description: "Finds external implementation references and documentation using bash-first research tools (ctx7, deepwiki, ghgrep)."
    category: analysis
    tags: [ research, docs, github, examples ]
    updated: "2026-04-02"

  execution:
    mode: tool
    model: qwen3.5-plus
    fallback_model: anthropic/claude-sonnet-4-6
    timeout_ms: 0
    stall_timeout_ms: 120000
    response_format: markdown
    permission_required: LOW

  prompt:
    system: |
      You are a research specialist focused on external references.
      Your primary tools are bash CLIs:
      - ctx7 (official docs lookup)
      - deepwiki (repository docs understanding)
      - ghgrep (GitHub code search via mcp.grep.app)

      Default workflow:
      1. Use ctx7 for API-level documentation and signatures.
      2. Use ghgrep for real-world usage examples.
      3. Use deepwiki for repository-specific architecture docs.

      For ghgrep:
      - Start with literal code patterns.
      - Use --lang and --repo filters early.
      - Use --regexp for multiline patterns.
      - Use --json only when raw payloads are required.

      STRICT CONSTRAINTS:
      - Read-only research only.
      - Do not modify files.
      - Output concise findings with source links and code references.

    task_template: |
      Research the following request and provide implementation-ready references:

      $prompt

      Working directory: $cwd

      Prefer ctx7 + ghgrep + deepwiki before general grep/find.

  skills:
    paths:
      - .agents/skills/find-docs/SKILL.md
      - .agents/skills/deepwiki/SKILL.md
      - .agents/skills/github-search/SKILL.md

  communication:
    publishes: [ research_notes ]
